body:
  text: 伐檀集别集類二宋提要臣等謹案伐檀集二卷宋黃庶撰庶字亞夫分寧人慶厯二年進士厯佐一府三州皆為從事後終于攝知康州黃庭堅之父也江西詩𣲖奉庭堅為初祖而庭堅之學韓愈實自庶先倡其和柳子玉十詠中怪石一首最為世所傳誦然集中古體諸詩並戞戞自造不蹈陳因雖魄力不及庭堅之雄濶運用古事鎔鑄煎裁亦不及庭堅之工妙而生新矯拔則取徑略同先河後海其淵源要有自也惟開卷近體諸詩乃多不工觀集中吕造許昌十詠後序稱造天聖中為許昌掾取境內古迹之著者為十詠其時文章用聲律最盛哇淫破碎不可讀其于詩尤甚士出于其間為詞章能主意思而不流者固少而最難云云然則庶當西崑體盛行之時頗有意矯其流弊故謝崔象之示詩稿一首有淡泊路久茀共約鋤榛菅之句擬歐陽舍人古篆一首有蘇梅鸞鳯相上下鄙語燕雀何能羣之句原注蘇子美梅聖俞同有此詩而其古文一卷亦古質簡徑頗具韓愈規格不屑為駢偶纎濃之詞其不甚加意于近體蓋由于此非其才有不逮也其集自宋以來即附刻山谷集末然子雖齊聖不先父食古有明訓列父詩于子集之末于義終為未協故今析之别著録焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀伐檀集序江夏黃庶字亞夫其少而學也觀詩書以來至于忠臣義士竒功大節常恨身不出于其時不得與古人上下其事每輒自奮以為苟朝得位夕必行之當使後之人望乎已若今之慕乎古也既年二十五以詩賦得第一歷佐一府三州皆為從事踰十年郡之政巨細無不與大抵止于簿書獄訟而已其心之所存可以效于君可以補于國可以資于民者曾未有一事可以自見然而月廩於官粟麥常兩斛而錢常七千問其所為乃一常人皆可不勉而能茲素餐昭昭矣暇日發常所作藁草得數百篇覽初省末散亡居多其存者或失首與尾或竄乙斷裂不可讀因取其完者以類相從而編焉題之曰伐檀集且識其愧然其性嗜文字若有病癖未能無妄作後來者皆附於篇之末云時皇祐五年十二月青社自序伐檀集序
