body:
  text: 伐檀集卷上宋黃庶撰詩偶書此心為地把書耕若問生涯指六經欲語世人真富貴胸中珠玉又無形讀赦書詔書一尺洗寰瀛舒卷雷霆萬物驚天祇無私均雨露地緣强半是榛荆人間疾苦言堪療山徑豺狼腹未盈不是朝廷用桑孔丁寧渾只念蒼生遣懷六載紅蓮客差池又一年無人和白雪有意樂青天肝膽論興廢詩書謁聖賢尊中古日月窮達付陶甄山居獨酌山寒未放春消息獨把單醪慰寂寥書對聖賢為客主竹兼風雨似咸韶醉鄉城郭燈前到愁壘戈矛盞底銷野菜溪魚隨分有不堪回首呌簞瓢春日閒居韁鎖身閒似未名方愚情性被春輕酒教筆硯因花廢路為亭臺與草爭野客笋邀煨短茁鄰僧茶約煮新萌無時杖屨穿林去真是尋芳户一丁贈山寺僧慵飽浮圖世共憎蓬蒿師獨養牛耕田驅白石年常過林印青薪嵗旋生竹似子孫憐笋茁樹添松柏補風聲眉頭怪得春來喜雨起蔬苗粒粒成寄子䝉授常寧令疏率君堪愛無心宦又髙身思眠白屋人勉著青袍去冬調官京師於銓吏不得意欲致其官而歸豫止之號隱疑名福前為寧鄉尉自號吏隱貪歸似姓陶常寧邑雖小應合得牛刀靈竹俗傳孟宗所泣斑行也今在鄂州寺緑隂清韻竹枝繁歷厯當年泣淚痕千古舜妃湘水底必應憔悴有慚魂山水卧屏林泉生長厭應難更寫方屏幾曲間仕宦東西苦無定此心長似宿家山和劉卿材十詠耕者四海兵今息耕夫未得知黃粱不敢喫碗尚半蒿藜牧竪逐處隨青草生來不識愁旱田乾欲死拍手也須謳紅樹幾樹濃於茜斜陽景最幽忽因風雨盡全減十分秋野廟中國浮圖盛祈禳漸不過吾民非獨困山鬼恨尤多堠子一堠居市塵百堠居林莽土木若有情山中亦惆悵水鴨憶在山中日溪邊把釣鈎相逢恐驚起招手却回舟溪聲至音不可收今人滯形器欲知古樂心山中此聲是草市衝市柴魚集應山雞犬號問知人苦樂米價不多髙龍潭寂寞真龍去雩壇血不乾世情多冷暖對此鼻辛酸溪橋憶得别離日鄉橋栁腳斜讀君詩一轉全似到吾家觀雪疑是天公戲都傾海作鹽松筠知不變丘壑見無厭清為詩家極寒因酒户添冬溫成俗疫得此勝針砭酒千載醇醲意長隨麴蘖新解詩今日月轉入古乾坤協韻悶至勝良藥愁來敵故人幾杯聊酩酊五斗趣還均登鄭氏閣林泉無價自由身韁鎖登臨趣未真望處好山俱得力夜應明月不孤人任從心外煩於蟻長對樽中别有春當日若知風物勝定移雞犬過江濱前山皆秀可愛豫家亭閣不能見故云立春此日春方到春心亞舜堯勾芒如稷契太蔟似咸韶衡柄三陽把陶鎔萬物翹家家助和氣剪綵作花飄題人移牡丹林上春來恰恰忙安排顔色與春妝栽培欲報應先發根柢雖移不改芳紅藥便隨心減價黃蜂偷喜蜜添香慿君剩釀看花酒待插花枝滿首嘗探春雪裏猶能醉落梅好營杯具待春來東風便試新刀尺萬葉千花一手裁笻竹杖琴鶴為友朋出入常拂拭生來節便髙故有扶危力題東寺柱竹風松月牢於鎖關閉人心物外情燕雀聞經俱已慣歸來不怕讀書聲教繩權學書偶成文字有緣曾弄墨楚俗子生周一年其日陳食飲硯墨金帛之具從兒戲弄聚家人觀以為樂繩時先弄墨見來官小免咨嗟喜將筆硯傳生計不失詩書作世家字識姓名能指㸃寫因梨栗不傾斜著鞭莫落時人後三十塵埃監汝爺次韻答王甫判官已後長安塵埃蹭蹬落粗官賴有詩書可自安人到聖賢由感激國施鍾鼎為艱難須期燕骨干金價莫動黃陂萬頃瀾窮達功名無早晚好山宜且醉吟看致政吳侍郎挽歌詞千里資甘㫖今資政守京兆淒涼一日遺為臣如廣受生子似臯䕫筆硯諸孫哭謳歌幾郡思公屢為二千石秦人失太守翻有怨天辭荆棘二疏路幾人同敝衣仕塗師白髮國老欲彤幃遺藁詩書滿行旌雨雪飛陜民應淚落不見板輿歸今資政自陜移京兆署中新裁竹移作亭園主栽培霜雪姿不辭桃李笑只待鳳凰知少已留風住疏宜待月篩相看時一醉誰道小官卑和題雲臺觀用韻太華疑挨畢昴回欲觀形勝上雲臺雪中地把銀屏立雨後天將畫軸開景好更宜和月看客忙常是愛山來我知逰者登臨意常恨西軒落日催都㕔誦書偶成主人調鼎手千里刃迎虛暗使民如堵能容吏似樗莓苔眠杻械燕雀聽詩書刀筆慙無補身為白蠧魚題公美庭前蘆長安只說誰花好君把青蘆砌下栽鳴鴈也知人事好幾時銜得入關來和公美季㸃書事知君行縣樂經見飽朝昏禾黍當年户牛羊落日村趂雲看華沒衝雨渡涇渾頗得詩家助聊應慰旅魂送石都官赴闕為郎四十者堂有二親稀止仰官為養行應淚在衣白雲偏佇立黃犬好頻歸去有山公啓天心正似饑長安賀晏相公生辰衙鼓簪紳動靈椿薦夀醪吾君合堯舜此日降伊皋盤誥文章老丹青事業牢兩朝尊柱石千里荷鈞陶民即謳歌借霖應夢寐勞秦人下車樂逺邇賦嵩髙公下車始五日次韻和言懷五常為種耕情性天意寧分有與無史解戮人惟戮古地能埋死只埋愚青雲易把詩書買白髮難停日月驅顧我無才背時俗浮名早晚見歸途和子玉病起逰書齊蕭齊久不住筋力試笻初窗户蝸涎鎖塵埃鼠跡書病魔雖已去詩癖竟難除苔地欣重掃徘徊意有餘依韻和舞陽楊令九日羊川鄉同小飲之作青帘白屋得新醅坐待村童買果回旋撚野花為泛菊更尋山路作登臺世途巳把灰心死樽酒聊同笑口開多謝晚禽知客意歌吟來往勸餘杯謝趙太傅遺聚米圖經圖經其子宣事舍人珣所作宣事死疆場覽之不勝悲感文武生賢子羌圖帝所多始欣知馬援終歎失廉頗定川之役宣事死之蒼鼠巢遺藁黃埃鎖舊戈逺人猶偃蹇掩帙淚滂沱哭丘隨州無逸卧理隨民欲問安訃郵俄至廢朝餐秦川舊㑹歡如在漢水新書墨未乾丹旐已歸人寂寞索車徒有淚汍瀾時情冷暖尤無味一臂相知在肺肝席上送韋中舍歸襄陽知君七十少梨栗有堅牙琴杖新行李雲泉舊世家講求栽樹法拂拭釣魚車獨美今歸去青衫脫有涯次韻和真長新春偶書東風寂寞掩柴關時苦刪文筆凍乾只把詩情磨世態更慿酒力禦春寒塵埃不必頻彈鋏巖石終期共掛冠歎息焚和名利者乾坤未似斗筲寬伊川喜雨時丞相文公省墓伊闕尺雨乘春慰望深家家倉廩一年心伊川父老還知否此是隨車𫝊說霖送真長書記知舞陽塵土淹沉客詩書夢寐身又辭千里幕去布一同春路想多歸户舞陽地薄民多逃庭應絶澇民舞陽地下嵗大雨河決輒潦青衫莫嗟歎知已在陶鈞和陪丞相聽蜀僧琴百年生計一張琴敝軫枯絃抵萬金世上幾人曾入耳樽前此日是知音清風明月虛無境白雪陽春寂寞心莫訝南薰沉聽久致君墓業用功深飲張承制園亭小園豈是春來晚四月花飛入酒杯都為主人尤好事風光留住不教回八日探菊行繞牆邊菊躊躇賞物心秋風應有意明日是知音酒惜浮花醉詩留把葉吟兒童欣佳節撚蘂試黃金市得笛竹簟因成詩八尺枯冰簟一筒小軒拂拭趣誰同樽前聲負千杯月窗下光贏一枕風易向曲肱增舊意詩因仰看有新功蠧書圍繞髙眠處夢與塵埃絶不通廬山道中遇黃介夫因寄四十字冷日蒼山下相逢笑又顰文章已膾炙名位尚埃塵昔見纓嘗請今言雉欲馴介夫新授安邑令干戈滿南郡忍醉解池春次韻和雪齊逰西湖雪㑹逰人意元乾變物華醉鄉銀作界詩客玉為家魚影紋冰縠禽蹤篆霰沙餘英恐銷盡目斷夕陽霞次韻向元伯春晚有作好花未得千場醉風雨飄零又一春自是勞生無暇日芳菲何處解孤人次韻居正暮春感事物報春光去已深殘紅滿地緑成隂晚花便好吟詩惜餘景應須載酒尋歡意莫教時節挫窮愁自倚嵗寒禁亭園况是登臨勝何必流年動素心次韻元伯西軒桃李李白桃紅氣味奢早須分付醉吟家春風春雨難期信便是無言做落花望春偶書信馬尋春上古原天工一幅繡平川花應笑我將詩句便當逰人費萬錢次韻居正四月牡丹時飲過客于丞相後園四月殘紅日日稀平陽園檻正芳菲春知東館酣賓客應是陽和未放歸和元伯走馬看牡丹城中走馬趂殘春詩别餘花處處新何似園家不吟醉姚黃魏紫屬逰人次韻元伯初夏南洋河即事芳菲已去絶音塵臨水踟蹰景又新應是溪源來最逺落花流水洞中春次韻子儀初夏偶作醉紅方寂寞吟緑又將成急雨荷宜聽清風簟可迎燕忙諳物態花盡見時情獨有無言意不知枯與榮看春榜偶成每看春榜獨嗟咨蹭蹬塵埃已十朞韓老有知應笑我歸時無計只癡兒陪丞相逰石子澗賓吏親攜澗底行潺湲風遞似相迎只應山鬼知公意乞雨新添瀑布聲時久晴未得雨澗下禽魚識上台聽泉履跡遍蒼苔巖邊不欲踟蹰久只恐商王夢逺來次韻和真長四季牧童許昌怯雨宜晴不識愁去隨青草牧春牛無人古語歌兼笑歸去山花插滿頭曉牧侵星大暑天晝尋芳樹緑隂眠惜牛不使衝殘日歸帶黃昏飲小川角穿黃穗手橫笳不省人間有鬢華落日西風歸去路枯桑黃葉兩三家枯笛手持無律吕清風曲調逐時新數竿冬日渾無價暖靠牛眠不教人次韻元伯曉出白門山形雲染翠屏曲溪色練鋪銀漢東樓臺一軸古今本行者往來圖畫中栽竹小檻栽培得此君緑隂疏韻似相親從來風月為三友吟社新添客一人嵩山許昌峩峩鎮中夏峻極萬尋隮突兀磨天頂窈窕入地臍中林興夏雹半壑卧秋霓泉恐連清漢峯疑擁碧圭雲髙四夷見雨到八方齊渤澥看如帶青冥上是梯醉堪捫日月吟可摘婁奎翠蓋何時動金為玉檢泥隱真齊庭多怪石小詩求數株曾經禹貢清泉骨禹貢青州岱畎鉛松怪石今是莓苔幾世孫知君突兀滿庭下乞我雨中雲數根和元伯中伏夜雨南洋河水泛雨洗三齊中伏月乖龍連夜起雲門青之南山有穴出雲故曰雲門溪聲斗似銀河落驚斷詩書一夢魂登鄆州溪堂古鄆州有溪堂與州偕廢其地去今治所十五里好事者跡其名為之韓公詩石存焉仁智摸來物狀親登臨宜入古圖身慣看韓老詩中景樹色泉聲似故人中秋夜月人間共賞中秋月酒社詩家意味長天上必應霜露早桂叢凋盡飽青光古詩上輦下㑹里人子䝉飲秋風吹客衣歸思入夢寐相逢在千里一飲勝百醉果脯隨分列不減到家味平生金石心顛倒獨莫棄何時不搔首共話醫國計恨未得杞梓欲把斤斧試塵埃鞋履穿各走車馬地惟茲栖栖懷酒碗可以慰探春春色若有價黃金量山丘幾擬把酒吟浪欲開口酬今朝庭栁枝拗折絲巳柔東風弄五色漸落草木稠我營賞春資甕盎蟻巳浮山川天開畫秖擬酩酊逰對花詩昔甫白在造化困刀尺我生幾年後浪自鐫頑石對花雖把筆好句恨莫得耒陽與采石孤墳沒荆棘幾欲肉白骨再插風雅翼海為一杯酒地為一領席醉坐吟萬物語出埋霹靂乾坤髓可掬鬼神淚可滴人生貴適意身是天地客糟牀不可乾吟紙須强擘花落若解醫有金費千鎰和白雲菴七首白雲菴白雲無種滿地生有時出山為雲露老僧惆悵望雲歸盡日菴前自來去清風軒老僧拂榻人不知獨與清風自來去朝昏宴坐向齊中此身便是清風主宴坐臺老僧坐見萬物空往往終日居此臺破衣兀坐若枯木山鳥不怕行莓苔醒石老僧拂拭待逰者雲骨一片莓苔青塵埃萬事心若醉到此不覺令人醒磬石古樂破散鄭衛起走入萬物不可名山中惆悵莫能到疑是舜時韶一聲明月臺老僧山中嫌月窄夜夜獨上髙髙臺四邊不肯著閒樹故要滿坐清光來白石澗林間旋疊石為路日日自汲澗底泉老僧意趣似童子洗手濯足聽潺湲登扶風王宗元山亭雲收南山頭太白青崔嵬我有泉石夢坐對懷抱開小池數斛水涉鳥來毰毸遺翎與行跡縱橫在蒼苔憶得釣磯上到家如一回蔬畦參差緑採掇助酒杯痛飲不能去繞竹猶徘徊主人林巖癖笑傲蒼烟堆心憂百里病良田正黃埃欲知主人喜雨抱山腳來圖經云太白之半有橫雲如瀑布則澍雨常以為候故語曰南山瀑布非朝即暮時久旱始得雨以為喜故云賦得退之畫像功名已寫後世耳身入人間圖畫看歎息浮圖滿天下猶疑怒髮尚衝冠逰石甕寺飛泉自有迎客意聲到山前入人耳泉聲引行不知疲石路磽確折屐齒長安睫滿車馬塵林嵒夜夜來夢寐雲烟郊原銷古圖心眼開快明如洗渭流屈曲成大篆書破野色為緑紙丘墟沉吟古興廢秋風正入紅樹起折碑斷垣卧荆棘意思紛亂不可理窮幽更下蒼崖根把酒坐聽潺湲醉山花似欲勸苦飲時散清香入人鼻奔走恨不身長逰喜寫姓名藏薜荔喜雪長安雪一尺朝扉失南山坐喜疾疫消敢避衣褐單關中西征後所向饘粥慳去年新錢敝千里成凋殘漫漫豐穰候風俗開容顔秦人飽稼穡共望倉廩寬幕府俸薄少藜藿日滿盤明年麥定好慰喜聊加餐次韻和松徑行人旱亢日共䕃蒼烟姿豈識雪霜心但輕螻蟻皮中為棟梁用莫歎斧斤遲樗栁盡犧象後凋終不衰登大雲頂區區霸迹欲知小試絶大雲孤頂看老僧指我日上處鏡面瀉出黃金盤青州去海尚踰二百里寺僧云山頂日出時往往見海古詩下送黃景微西逰晞先生古肝脾久恨不得識惟聞公卿家要作門下客千載卞和淚爭磨薦書墨姓名落四海履雜車馬跡塵埃十年衣幾度改顔色紛紛九衢中拭眼見圭璧敝褐埋衆人胸肺無丈尺從來饑渴心既見轉不釋斗酒聽語論今古吐白黑秋入汴栁枝買馬欲西適虜方豺狼驕似漢子弟國豫知弱諸侯必得主父策謝劉簿李尉見訪詩書卧蓬蓽柴門晝方開邑官劉與李馬蹄破蒼苔林居厭蛙黽喜振敝席埃見此六翮姿茅荆共徘徊我欲駐車轍蔬果傾舊醅山花恨未饒無以助酒杯今古飽夜話痛飲勝百回春風旌旆滿匏瓜去難陪送郭評事節判磨勘已後長安塵埃衣襟改顔色獨洗青衫三十年足迹不入奔走途來往銓户履鞋穿一時同上青雲人往往禆補造化權朝梳滿手見白髮歎息不置齒牙間只言歸田有幾畝種秫欲上山中泉腰邊即見佩銅墨我喜百里瘡痍痊登見山樓太守終南為客主出入厭倦馬與車與山朝夕欲還往作樓近在室一隅主人去久山寂寞正值青帝催焦枯我拘簿書甚杻械擺脫步上提酒壺郊原猶來見春色似據水墨長安圖也知好景天更惜髙峯常是雲糢糊安得風伯持大篲掃灑百里如屏鋪顯昧萬狀古詩國收拾可秃千毫書我來願作風雅户醉倒坐待明月扶去家若有巖下夢免復夜夜尋歸途和題竹軒小軒移得清風枝知君公退來忘機山禽自識主人慣客到有時驚不飛下碁古人欲寫得喪形萬事盡在方罫內黑白勝負無已時目送孤鴻出雲外暑軒夜坐夜氣入庭樹小軒坐前簷清風動巨箑浮雲捲重簾月遲待交舊蚊噪憎諛讒清凉若可買金願量谷巖聞蛙佞舌兒女柔異教蜩螳喧豈能聽蛙黽靜枕詩書眠能一作如憶竹亭蓬萊楚山底傍去聲舍竹四圍狂鞭入門户亂笋爭牆籬與竹事還往相對一束書壯長走世路駑駘强鞭笞塵埃客灞滻逺夢夜夜歸小亭久不理漏楝生白芝偶放簿書筆杖履改舊詩呼童誅蒿萊掃灑莓苔基誰庭無花卉憎有兒女姿獨移蒼烟本慰我千里思坐生山林趣亭園有光輝免使清風來留在桃李枝月明繞竹步撚挽頤頷髭相向若知已動捶影參差人間缺藥石稚乳驕羌夷青衫汗汙垢尺寸莫可禆忍作倉廩盜寧老詩書饑養筍為釣竿早晚耕蒿藜和百塔寺四首四間亭亭前流水醒客耳亭上白雲開客顔老僧有意厚來往四面更令看好山聽泉近詔天下收古樂器五音入耳大聲散情性破碎不可完而今虞舜欲儀鳳願獻泉譜為韶源芳亭峩峩佛屋瘦四海志士歎息傷容顔髙僧淳拙有深意獨自結茅山水間水閣山僧聽泉聲不足鑿池汲引為蟾泓自言猶欲洗俗耳夜靜為聞蛙黽聲和暑雨偶書暑如煎烹欲狂走猛雨如洗沉疴瘳寧知詩書一枕夢便作桃李三春逰蛙蜩呌噪若交舊蚊蠅癡鈍如仇讎今君病起正髙卧莊蝶處處宜相求漁家長安前詩插屋數竿網穿籬幾尺船水鄉菱茨足不著免租錢時江南旱宿趙屯蘆花一股水弭楫日已暮山間聞雞犬無人見烟樹行逐羊豕跡始識入市路菱茨與魚蟹居人足來去漁家無鄉縣滿船載稚乳鞭笞公私急醉眠聽秋雨右詩與大孤山一首山谷嘗手書刻石于南康星子灣有跋見别集宿采石秋風宿蒹葭花落若霜雪江山古興廢荆棘壘出沒水收鳬雁聲夜靜寒籟發漁舟自來去笑語載明月詩形動筆墨恨乏風雅骨謫仙為黃土冡平名突兀句編天下口千載字不滅人間比興復泉底魂魄恱坐誦姑熟語酌酒當棗栗醉夢若可見好句當須乞謫仙有姑熟十詠擬歐陽舍人古篆𨽻書滿紙籕文廢字法破碎失本根中間陽氷入篆室下筆日與丞相親㸃畫各為萬物體科蚪筋骨千載新泉銘學語童子知大厯幾字名忽振足知古人自負恃碑峴巨石垂千春篆字堆積天下宇晚得紙本如希珍鋪舒牆壁動人眼直木曲鐵若可捫人為黃土久寂寞略不訛缺才鱗皴我疑山鬼恐漫滅往往鐫鑿施斧斤公來醉吟江山國得之愛歎何殷勤刻詞猶恨紀不足句句與古風雅鄰一旦紙貴文字市粥詩賈篆聲云云蘇梅鸞鳳相上下鄙語燕雀何能羣蘇子梅梅聖俞同有此詩大孤山彭蠡百里南國襟萬頃蒼烟插孤岑不知天星何時落春秋不書不可尋石怪木老鬼所附茲乃與水同浮沉鳴鴟大藤樹下廟血食不乾年世深軸艫千里不敢越割牲釃酒來獻斟我行不忍隨人後許國肝膽神所歆落帆夜宿白鳥岸睥睨百繞寒藤隂銀山大浪獨夫險比干一片崔嵬心宦逰逺去父母國心病若有山水淫江南畫工今誰在拂拭東絹傾千金右與宿趙屯同載石刻汴河汴都峩峩在平地宋恃其德為金湯先帝始初有深意不使子孫生怠荒萬艘北來食京師汴水遂作東南吭甲兵百萬以為命千里天下之腑腸人心愛惜此流水不啻布帛與稻粱漢唐關中數百年木牛可以腐太倉舟楫利今百於古奈何益見府庫瘡天心正欲醫造化人間豈無針石良窟沉但去錢穀蠧此水何必求桑羊樊侯廟隂森樊侯廟古木灃水傍茲民畏如生奔走豕與羊家家奉侯諱若在父母堂舞陽老幼以侯名為諱我來憩行役冉拜奠公觴緬思英豪姿名與此水長風偃衆樹枝擬若怒鬛張隂官有兵師想在賁育行今茲悍敵驕內為府庫瘡安得七尺軀長㦸再激昻橫行胸奴中庶以康肺腸逰石池潭吾家溪潭動百尺坐見逰魚可倒指月明無水風不動釣絲鑑中出朱鯉乘閒具酒席草岸呼網一舉常百尾鱠霜炙玉眠鴟夷樹掛落日醉不起幾年手板負青山趂魚舷聲不入耳涼秋九月役吏事瘦馬奔走黃葉裏有酒不得好景飲訪古或問芻牧子指我石池千里近蒼苔畏崖碧無底楚王北逰歎寂寞創竒造幽有遺址舞陽民傳楚襄王遊此臨河以石為池我來徘徊知是否廢興盡可付流水髣佛故溪在吾目濯手潄齒有餘思開樽喜與風景遇蘆花入杯勸人醉漁翁有意助酒巵青竹盡日垂空餌我疑溪靈靳異景不遣紅鱗滿人意人生天地未歸客計較貴賤羞犬彘當須醉倒載月歸不信鄉夢留不止食鱠秋風蓴魚肥罝饞涎落溪友入晝夢但苦青衫縛落日渡河水食指相悟覺宿夕治鱠具共作泛舟約網罟遮青答老鱒薦絲臛玉軟飽下筋坐視肴果惡酒薄如疲兵對此得衛霍回首食五鼎適意均一樂人間軍需後甑釜有藜藿甘鮮豈敢事聊此慰寂寞家僮來持雙井芽數數飲之輒成詩以示同舍我疑醇醲千古味寂寞散在山茶枝雙井名入天下耳建溪春色無光輝吾鄉茶友若敵國糞土尺璧珍刀圭嗟豫奔走車馬跡塵埃荆棘生喉頤煮雲為腴不可見青泉緑樹應相嗤長鬚前日千里至百芽包裹林巖姿開緘春風若滿手喜氣收拾人恐知江南陽和夜欲試小齊獨與清風期石鼎泉甘火齊得混沌不死元氣肥詩書坐對為客主一啜已見沆􅒭醨通宵安穩睡物外家夢欲遣不肯歸不信試來與君飲洗出正性還肝脾靈井何年清泉眼幾斛涵蒼苔甕盎日夜至長滿莫可涯天旱不知竭衆流起黃埃淘綆乾未定能使沴氣開大旱淘井竭其水必得雨以為常廟祠失根柢故老奠酒杯井傍有特詞或曰衛靈公廟蠶民呪棗栗千斤意徘徊臘月民持蠶紙浴井中必投棗栗呪祝其辭曰齊起齊眠千斤萬斤兒童慣冷暖預知春秋來臨之鑒鬚眉方鑑無煤炲窟穴若喉吭我疑吐雲雷何當鞭蜃螭與國驅旱灾過建成侯廟陽翟鳴鴟古木末饑鳥啄腐柯下有黃侯宫清風在藤蘿公昔為刺史俗若閨門和德銘潁人心千載不可磨至今奉如生慢侮莫敢過破祠望道路丹簷獨峩峩春秋賽豚肩里巫日婆娑牛童不知此來往夕陽歌過許由冡在箕山上其下潁水稷契寧渴死不飲箕潁泉先生獨洗耳不聽天子言清風飽進退千載何悠然孤墳沒荆棘髙名爭青山嗟我迍邅身一命行十年味薄無辛鹹璞頑廢雕鐫朝行箕山麓暮挹潁水源竹帛何處所搔首熊魚間白雲要閒友尚苦兒女牽丈夫合勇決顧計羞面顔洛陽道中秋風滿巾衣洛水行飲馬山川氣象老身若在古畫嵩雲知客心峯色如掃灑荒草遍丘墟沉吟動舒瀉過少姨廟少室山中隂森老柏少姨廟爐烟蓬勃疑行雲祭盤狼藉山鳥飽巫祝生涯來往人竹軒小軒與竹事還往庭下寂寂無客塵開書讀對聖賢語一畝清風為主人賦聞角得德字角本金鼓儔獨主昏曉色日收雲氣黃月斜霜露白征夫朝夕聞淚落甲鎧黑時平腐櫜鞬白首眼不識嚴城重啓閉不廢角人職老農鼓腹聽安識天子德賦小桐小桐才幾尺氣壓百嵗樗雨露意未飽風月韻已孤鳳凰肯寂寞鳥雀空踟蹰天地有和氣想為桐之腴我願刳作琴獻上九重居坐使薰風還雖死骨不朽賦轆轤火雲旱風苗欲死曲木直綆寒泉深耕夫淚濕原上土老圃顧盻輕黃金賦古佛樹老枝半死碑斷壁底眠古屋顔色改有佛獨巋然蒼首上雨足壞臂蔓草纒野老每再拜往往報豐年孔祠照四方制度丹雘妍朝夕過其下孰肯為恭䖍土木茲僅分吾民信益堅佛法入人心誰與斸其根蒼蒼不可問用意或者偏木蠧罪豈大付與啄木權胡不啄佛徒使蠧民之天賦古碑得金字闕次韻和中伏坐夜萬兵昏雨過暑斗插雲傾老佞溪蛙靜真交海月生逰氛褰幕帟逺籟起莖英清洗塵埃慮幽通造化情酸醎時味薄寂寞古途亨去象筌真意無形寫天聲詩疑窺杜子文欲造盤庚身在清風國神逰白玉城希夷乘浩氣沆􅒭飲元精坐久忘昏寐回頭有啓明炙贅疣贅疣在豫手纍久至三四初視君外物於意不能置居閒或炙灼已出沒復繼贅出與贅沒曾莫生死異天地贅一氣萬物贅天地贅復贅於人小大而已矣人之於為贅作為有大盩至理本無事破真以為僞善惡亂大性賞罰亂大治宫徵亂大聲青黃亂大賁寸尺亂大刑酸醎亂大味大朴如瘡疸空虛無完理天地不爾仇爾獨贅之計恥之不若人孟子其有謂志小略其大殆非達者意棄火復投艾兩忘吾贅贅賦八月竹我養一軒竹秋來成緑隂萬物有衰意獨懷霜雪心西風嵇叔醉明月白公吟回首看桃李何嘗費百金逰雲門山南山州之屏平四時改顔色日夕太守宴供帳減繒帛更求秉燭飲圖寫在四壁烟雲時藏埋景好疑愛惜我官府中塵喜與山相識泉石未還往愧負苦逋責秋風復杖履持酒窮勝僻莓苔轉蒼崖郡國在几席廢興賦飛鳥牛羊自朝夕風物摹大句才薄徒噤默惟作酩酊歸山月吐半璧沉吟又慰喜三友添飲客豫于署居之南作亭朝夕以與風月往還名之曰三友共南軒與山相值故云耳攜家逰倭松倭松名載四海耳百怪老筆不可傳左妻右兒醉樹下安得白首巢其巔庭樹聫句枝字為韻某甫王婆娑庭中樹老大千年枝某百弓蔽赫日四座生凉颸甫影怪疑龍蛇聲和認塤箎某未被斧斤賞敢辭塵埃欺甫輪囷壯士歎冷淡童子嗤某盤根得地固挺材本天資甫枌榆謾百尺杞栁徒一圍某節堅費刻畫莫訝繩墨遲甫枝狂躍蛟虬癭怪蹲熊羆有時相摩擊往往霹靂飛某篩月碎玉散障日翠幄垂甫空腹懶龍卧實少饑禽悲敗葉童僕憎清隂兒女嬉堂萱小人態階藥老婢姿春琴似竽笙夏蜩若羮糜提孩不出户知時如蓍龜某得成孤髙狀敢忘去毫末時甫身遭藤蘿蔽心無松柏期某晨烟拂杪起落日侵梢齊甫老蠧病其中啄木為良醫公輸不在世志士空嗟咨某止知楩楠髙苦厭樗櫟卑甫大屋必欲構老匠寧終遺某棟梁如採收散材安足知甫斑石枕聫句向宗道某斸得西山骨磨礱露斑駮凝結一何怪宗道形模萬難學直疑彩雲根某又訝紫珉璞中瘦􅀈蛟腹宗道外文灼龜殼冷剖清泉肝某􅖽榰老鼇腳堅方君子性宗道清純聖人朴有氣當補天某無瑕應並㲄定漬盤古苔宗道想漏神農藥堪作夢寐寶某尤是炎蒸託眠月病頭愈宗道橫風酲肺濯珊瑚侈可唾陶陶甄脆堪撲夜欹魘鬼驚宗道晝冷詩魔愕首愜無俗夢某心清去煩惡蘄簟方敢友宗道蜀笻良可約何必檄愈風某何必文驅瘧質任兒女嗤宗道頑宜僮僕謔枕流固迂誕某藉糟徒落魄潤生審將雨宗道輝發疑有珏髑髏莊生狂某虎魄宋武薄欲鑱中郎銘文章體猶弱欲袐淮南書神仙志非樂宗道我疑混沌礦誰與礱竅鑿可作甘寢輿華胥詣寞寞某子道足施為我拙困嬰縛巳謀其巾屨行當老蒿藿子其乞我歸終焉卧雲壑宗道嗜好我巳癖須求子雖慤氊舊王固惜瓢陋顔不博異時一經子便當千金橐客退獨摩拂卧送山月落送蘇田司理秦人勇鬭暴獄訟號難理錙銖較罪法闕責莫可避蘇生決曺掾以明縛姦吏我見獄户囚出入有平氣章章三年課已在山公啓六月暑濕衣出汗若炊燹俸微迫朝夕衝熱事行李一身不能賙送子腸腑沸送李室長慶州寧覲我愛孟堅文學飽持筆去作將軍客鋪張大漢征北功手攜直上燕然刻千載事掛單于眼至今猶若擒白黑幾年羌夷瘡一方窟冗未掃壯士瘠我生南方長詩書愛國區區肺如炙欲于塞外勒姓名往往夜夢賀蘭石一來長安事刀筆駑駘不展芻栗力峩峩李公邦之梓聲載百郡理霹靂今年權佩慶州印上馬威至吞秋色羌夷奔走若奴婢剺面童子嗔可摑白頭慶民能記數上聲前時太守有隂德君之祖前知慶州試求園中手栽樹邊人應作甘棠惜老幼事公如父兄妥帖不敢相干極子來别我省塞上霜風漸著邊樹赤塵埃恨絆不得往安得鑽肩生羽翼子今才華筆端富山川去入風雅國黃雲白草牛羊肥區落雞犬晴歷歷將詩寫作聚米圖歸來為我一指畫和栁子玉官舍十首心適堂一屏一榻無俗塵左置枯琴右開易重門不閉誰往還明月清風是相識思山齊吳兒心著吳山深終南滿目不自慰有時蟬蛻書几邊夢到五湖千里外君吳人小池清泉數斛關幽事坐見鏡中魚往來浮萍蝕盡秋月滿霜為一磨如匣開新泉牆根新冽寒泉眼風廊一股來泠泠燈花夜半知我喜恰是舊山穿石聲竹塢笋隨人意疏處生清風如歸自來去雖然不與俗子期隂過鄰家亦銷暑土榻牀前一尺二尺泉牀後三枝五枝樹眠閒圗似在家山夢魂不使東南去一云榻前鼓吹蛙一部榻上古木吟風雨客來相依曲肱眠免令不解山公語怪石山阿有人著薜荔廷下縳虎眠莓苔手摩心語知許事曾見漢唐池館來一云山鬼水怪著薜荔天祿辟邪眠莓苔鈎簾坐對心語口曾見漢唐池館來茴香鄰家爭插紅紫歸詩人獨行嗅芳草叢邊幽蠧更不凡蝴蝶紛紛逐花老茴香多蠧蜜蜂秋成想見香租入菊露蜂膠蜜幾脾日日山童掃紅葉蜂衙知是主人歸君權酒卯入申出芭蕉有底春風能好事解將刀尺剪青天知君新得草書法旋卷碧雲供小箋君善萆書送楊侍讀自長安之蜀西征七年四方病關中所向尤瘡痍欲令福星及憔悴千里特輟廊廟姿公知手持天子德家至户到人人施秦俗鬭暴號難理列郡京兆猶鼎糜公來寬假訟訴少杻械顛倒生菌芝神疑公惠入人淺六月巖谷囚雨師雩壇滴酒土未乾雱沛已洗旌旗歸今年夏公三禱雨皆即應老農笑呼刺史雨菽粟茂好公所攜關中自用兵踰十年其地未嘗俱大收今年夏秋田髙下盡豐民往往指菽粟曰此是侍讀帶來幾年軍需俗枯槁老幼不足蒿與藜薄田今亦夏秋稔竇窖飽滿雞猪肥公之去思甚明白衆口巳寫德政辭鐫鑱不要路傍石人心自是長安碑今年夷馬飲瀘水苴土新佩黃金龜公新拜蜀國侯相如才髙去諭蜀弩矢故事重光輝公故蜀人雍人欲把冦恂借益部已歎廉公遲傅巖今屬九折外帝夢即往西南涯答王甫判官示逰興慶池之作東池十里近遭匝風物飽南山若户屏登臨四時好我初來長安腳擬朝夕到纒綿簿書間拘窘若囚盜一嵗無幾至荏苒成吏考夜夜千頃月只供釣魚老平生林泉心探竒欲傾倒咫尺乃尚爾滿意寧可保君官苦近市危坐若林槁偷閒呶呶中躍馬志敲暴登覽足意思滿腹若瓌寶歸來成新詩使我愧懷抱依韻和酬雷太簡見貽之什生長詩與書不信世道難出處愧古人章句得一官舌强去聲不肯柔開口誰欣歡十年走塵土蹭蹬苦地寒紆朱非良貴寧較厚與單古心自突兀胸中鬱萬端昔常玩於水今乃知其瀾身世心已灰人事鼻可酸病卧得君詩喜拭昏膜看意逺辭淡泊稠重欲相寬以言藥我病吳鱸佐秦餐大句牽勉酬韻髙語難安謝崔象之示詩藁古樂治情性故使風俗完鄭衛入人耳雅正聲日殫教化走薄惡靡靡如轉丸全音不可見來往寂寞間我疑至和意獨落詩人肝或以鳴道德或以傷憂患存者三百篇興寄青與丹至今如清風留在喬木端敦厚久衰落坐見王澤乾後世其得者或謁道之門失者抱太羮競下醎與酸最晚李杜出遂將風雅壇內以康心脾睥睨萬物根豫早酷愛慕强把屈瓠鑽當食對藜藿誦之若熊蹯崔子我同好韻宇嗟璞渾其詩長於道意趣猶捭豚巨軸踰百篇抵我輕璵璠得之忘睡眠夜拭瞳膜昏若遊金貂市時見太古冠淡泊路久茀兵約鋤榛菅當結明月期與君酌醇源次韻和真長幕中偶書人情歲時登卿縣自無訟公庭破莓苔日苦黥徒送幕府隱詩書黃堂卧梁棟幾字署紙尾朝夕寧倥偬塵土安止足性情適吟諷收心觀無始靜卧憫羣動勞生懵出處欲把清風鞚青山自無價夜夜有歸夢但知陶潛卑寧識賈生慟夜雨誦君詩一杯齊費用次韻和酬真長對雪之作西湖主人久未至雪雲我為開吟天偷閒把酒羅膾鯉魚凍難趂煩鳴舷旋求野果向山市僮僕覔路占平川恍然白玉為飲國寒威醉思相翩翾顧盼萬景來筆端濡染欲為毫已堅初疑萬國㑹盟散斷圭破璧盈祜田禽巢一一鶴上下冰殿掃灑迎羣仙又疑水官愛雪栁故把衆庶為飛綿我思江淮有流民往往匍匐僵道邊朱門意氣與寒競上為酒面紅欲燃天將景與富貴買不知二費幾萬錢詩家把筆爭造化對此自恨才慳偏徘徊嗅嚼醉還醒上來往但見鞋履穿歸來庭樹玉花落稚子狂走皆華顛擁爐搔首有餘意喜與牟麥為豐年夜䦨更欲和月看坐久諷誦瓊瑶篇調高白雪古難和思短强被詩魔牽卒章我欲涕淚下連茹固已知君賢喜雨上文相公火神侵官弄胸臆青帝欲滿勾芒慵時春未下雨驕陽暴苗不得秀風俗相顧無顔容我公禆補造化手乞許暫息平姦驄公常乘驄馬西湖景好天子借訟簡朝夕臨青銅忽窺庭民有旱色輟寢廢飯忘巾笻公問暇常服道巾笻杖往來湖中訪求雩法得古本若可舒卷隂陽功除壇規土鍤未動精意已與神耳通雷官風師不敢息先時奔走鞭羣龍稚苖雱霈飽哺乳一夕換得千里豐老幼歡呼相公雨喜氣醖釀為和風一封朝緘萬室意慰減焦思寬九重選牲祀龍益傾倒大宅不滿猶忡忡朴愚幕吏解公意期雨霑足環海中不以一郡喜為喜喜憂天下公之公次韻和象之夏夜作大暑暴虐如惡酒意思頽困不可醒日官我疑借炎熱昊輪出火星熒熒霈然一雨翳晚景庭樹洗出蜩螳聲微雲掃灑供夜坐造化似解通人情風明月作三友趣君可買輕連城恍然身在冲泊域目空萬狀遺骸形此時象之入詩國句句煆錬爐鎚精窮微心到混沌側高處意氣捫日星詰朝携詩示我讀饑腸饞口逢珍烹義幽語險索究解如手捕虎不敢停歸來牽勉拾餘思魚目愧傍蟾蜍明和象之雨後望少室山白雲塵埃奔趨插手板十年已賣山中間相逢少室若交舊白雲與我開容顔風驅烟氣去敝幕天覆碧玉無瑕瘢我疑嶽神宴天上掃灑伊洛為圖看又疑山鬼有寒稅纊絮萬壘輸隂官色如可餐無厭飽頗黎為甑炊琅玕去去還觀不能已一里回首百據鞍長安許生以畫名閒暇拂拭新素紈能求山高水深趣常恐造化在筆端每觀雲泉得意處擬寫男女家其間今對異景慙首鼠愚若犬彘編槽欄君詩託我有深意明月一杯心往還席上賦別南宫希元十年眯車塵思歸入夢寐晨興見家山兩目如去翳故人又過我相對有餘意當樽話舊遊强笑復吁欷君名在鄉書捧檄不肯愧高堂去白髮有淚落鞭轡里人獻吉夢四壁衆所義希元應書里人屢獻夢長老以為吉祥我喜先子言在耳若龜筮先子嘗云希元孝而好學必不窮人生老聚散酒薄滿莫避相見意最長强去聲飲不能醉次韻和劉卿材見寄之什風波一相失倒指歲月耗交情見千里文字每教告胸中飽耘鋤勉我穫以道踟蹰竹帛間相期古人到十年走塵土心不勇於躁乃知鐫磨益不必硯席好呼報切君屈百里官卓趨而魯蹈不使鞭朴教人情自傾倒訟稀禾黍登醺若飲醇醪使者席未暖姓名達圭瑁部使者下車必亟薦卿材未嘗後麒麟踴躍起志逺無近報糞土齪齪者錙銖較稱號青冥腳可插泥塗迹將掃寧知西山民靖安帶西山之麓歸車恐君膏我行省版輿假途期問勞理聲如壁鄰歎息不可造豫道出海昏去靖安才數舍遙知詩書宰優游漆園傲極目西飛雲徒使瞳子眊敢期枉佳作綢繆布襟奧大句驅老意木古風雨暴驚味無厭已敗者豆籩犒我輒牽勉和徒手太阿冒酌酒持君詩吟哦舌根燥和西湖雪中泛舟之作時安公鎮許冬旱種不入潁人無顔色上輟霖雨姿福此千里窄公來視民憂身若抱病癖霖雨變飛雪萬室如藥石幕府環鄒枚共喜妖沴釋欲有瓊樹春選地得勝僻刺舟敲湖冰坐泛白玉國持酒與寒競醉倒無顧惜餘霙入杯斚似解勸飲客而我坐席未斗筲寬一石景值風雅匠萬狀困刀尺鳴鳯相上下獨愧如螻蟈送同年張明逺之興州掾赤髭苦顔貌我怪意氣揚人曰黜文登兹事可降霜歸來卧詩書藜藿甘肉粱乃知吾同升喜此剛肺腸甘脆迫朝夕拂衣莫安遑興山在何處蜀道難且長妻孥客蓬蓽板輿獨倣徨寄其孥青州獨迎母之官朱門腐鼎爼天理何茫茫皇祐五年三月乙已齊大風海水暴上夀光千乘兩縣民數百家被其災而死者幾半丞相平陽公以同年李君子儀往賑之以詩見寄因而和酬鹽民沒利家海隅奔走末業田園蕪天意似遣陽侯驅卷水沃殺煎海爐怒濤百尺不及逋老幼十五其為魚耕夫蠶婦來躊躇百金不易箔與鋤齊人言蠶者舉箔為數我公偃息哀其愚埋掩尸骼賙惸孤吾黨子儀馳赤駒口賫公惠人人噓日走百里嫌昳晡不飲不食顔色癯去時萬樹如束枯回首緑暗紅紫疏寄詩百言舉其粗我愧安飽心如苴元伯示清水泊之什因和酬十年不踏故溪上有時夢去千里遊每思魚行鑑中見青衫手板如仇讎秋風鱸肥美無價莫怪張翰不可留前日誦君清水吟胸中突起百尺愁兒牽女嬰走塵土百年一半如棄投清風明月無界畔白首願作山中侯君詩寫出漁者意老景一片在目眸清泉釣舟未入手聊可觀誦忘吾憂次韻和酬隱直憶花見寄之作春工不揀勢厚薄染成庭內花梢紅反拘簿書似機械不得醉倒眠緑叢君時馬首正南走假有樽酒何由同馨香蜂蝶似相讓顔色開落輸東風公餘徘徊獨繞樹空有歎恨不可窮君雖不見紅紫落亦有惆悵環胸中作詩寄我憶花意句老與古爭彊雄其間摸寫景如畫爛漫一片春顔容乃知詩家有刀尺裁翦自奪隂陽功誦詩酌酒無厭已韻險强續慚非工送劉孟卿逰天台鴈蕩二山治源先生髙七十山水病僻不可瘳竈無炊烟不顧計窮幽極怪如仇讎有時清風明月對好景霹靂拔却大樹不回頭四方泉石朝入耳杖屨百里夕已投大笑箕山不敢出走避軒冕豈自由天台鴈蕩潑上心暑焦毛髮不肯留縈紆長淮下平席倒指計日觀怒濤君詩工刻造化骨吳越氣象當先愁古今吟力未到處好句願備幽人收此行詩是圖畫畫山筆歸日借我目一逰次韻和元伯南樓避暑遇雨城頭歸烏喘榻翼夕陽欄干手可炙長虹如篆報雨來雲腳插下千里赤南山端正太古屏飛亷掃雲為撥墨安得老筆描寫住白頭許生死堪憶長安許生踰八十以水墨名於時今已死次韻和子儀聞蟬落日挂樹間長我庭下隂園林動秋意高蟬忽微吟清風轉餘聲香若下逺岑微物感時節鏗鍧吐商金古樂久破碎茲蟲抱全音荒忽尚偃蹇激起壯士心願為秋蟬操被之朱絲琴和子儀巡捕蝗天子輟霖雨茲來澤東民威聲先公至暴攘客四鄰下車坐無事懲勸禆秋春物價以日減囷倉飽新陳俗愚其何知蝗來遏公仁所至不為灾羣飛亂烟雲公慮種上聲吾土且為沴氣根計丁立捕法官行勞去聲其勤老幼千里眉朝蹙夕已伸我知公之德由此碑齊人求郭侍禁水墨樹石塵埃典却林泉閒家夢夜夜歸雲端知君弄筆欺造化乞我幾株松石看送元伯西歸飲者為量無大小要於醉焉而已矣乃知一飲一石徒醉鄉欲到無幾爾我幸俸薄飲不多酩酊造次有餘味有時酒伯投客轄斗筲往往衆所鄙近得元伯東海濵飲少好吟性相似山青月白得意時相對觴詠不能已直到千古醉者心名利莫可汚其耳乘興㺯筆窺造化混沌竅鑿可倒指須㬰椽杵成巨軸更唱迭和若宫徴今公官滿捨我去獨有姓名碑百里踟蹰預恐春風來青草坐見飲地起詩須數寄續百篇無使塵埃昏紙尾同有東秦唱和踰百篇讀君謨黼扆針常讀賈誼書愛其極理亂言入筆未乾絳灌舌如鑽文帝不肯為萬世為扼腕漢道竟齷齪席莫一日暖今讀君謨針句句到伊旦窺國見肺肝欲取以手浣何啻可痛哭一一中去世患設施有條理如肉以弗貫可作天下藥其應疾和緩非獨起國痿敵頸坐可絆聖賢方相逢辨别絳與灌萬不使斯言以為後世恨伐檀集卷上
