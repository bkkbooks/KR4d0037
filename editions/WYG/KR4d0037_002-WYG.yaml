body:
  text: 伐檀集巻下宋黄庶撰書啓上知諫王刑部書刑部執事竊以古誅諫之君桀紂也秦也後世諫者欲有言輒曰我必自納於不測之誅刀鋸鼎鑊無所懼如此是待其君為如何主也不知古雖有此刀鋸鼎鑊之具臣出一口逆其君之鱗徃徃遭烹戮至義君子奮不顧身以救國家之禍蹈之雖萬死不動後世無有是烹戮人之物矣言事之臣或得責大不過落一官其次出散地而已尚十八九憚此不肯言其人為賢與否何如哉宋起且百年自國初至今為諌者名聲卓卓可倒指者葢有數其避就上下忌諱言一兩事塞人責而卒無聞者固不少也又常聞時之論諌官患在天下紀綱大體利害口未及一事而専以摭人短長䙝私為故以此譏其苛細不知務誠然也恭以執事抱材通古以功名自許厯為郡縣有惠威莫不皆可紀如尉氏某十年間五六往還至是牛童馬走道之如昨日故一年拜御史二年為諫官起執事道州某居山中聞之竊幸欲以書賀僻遐不能自達為恨今者來入銓門而執事知諌院某䝉顧待最厚且舊淺薄思無以補助謹書常所懐三者之說藉手以為獻幸執事矯之旦夕立於國初至今可倒指之列某謹拜手以俟上宋侍讀書侍讀閣下某嘗讀退之與邢鳯翔書曰誠懼閣下以衆人視之則殺身不足以滅恥徒悔恨於無窮竊怪退之言如此過且君子何徃而不自得彼所見果賢也必無有不合果常人也其不見禮亦何足為恥與悔恨在退之之時人賢未有比其言尚如此况其他人巳乃脫然悟曰夫士以道自負不願妄為人知者其所欲往而見必時之卓犖偉人也苟為以衆人竢之誠為恥至大而悔無窮者也退之言信不謬某之身生三十年讀書者二十年慶厯初舉進士中乙第其文辭未有以出人其所懐未能大取知於時又常戒於退之之說凡三來京師足毎欲之公卿之庭自疑而十常七八輒止誠恐無以取重於人而徒得擯薄也竊以閣下之門天下士莫不皆願抱持其業以來取見知如某自顧何所可若前世所以安危存亡與今之得失未嘗不留於心閣下且假以咫尺地徐索其所有未必萬無一可取也某能言耳已得閣下之名畧識文字口已誦閣下之辭固願見而恨無由出門下有日矣今日來入銓門適遭閣下處侍從論議之地謹以書道其所以見之意又合常所為詩與雜言四十首以見其心之所存不敢以辭鄙無可采而輒廢不以藉手也唐突甚大愧懼上楊舍人書舍人閣下某嘗觀於漁大其網絕一淵而驅之舉以罾其得者或百若千數善魚常少而惡魚常多漁之人其意始莫不欲盡得善魚卒然惡魚并而又加多焉葢其勢然也今之取進士大類此亦其勢不得不爾也某慶厯初進士也時閤下司文之重輕而某以淺薄隨四百人落閣下網中所謂善與惡未能自決然閣下取於某以言也某知書以來反覆窺古人所以皇皇不暇寢與食非以筆墨為務要以所得同之衆人爾至窮躓卒不得施始寄其心於言以見於後之人而已也某誦此而慕之巳久得一官六年視職才五月入俸才三萬而困憂百端交來其姓名𨽻於國而身實居於閒無用之處故未能忘乎筆墨也前日謁門下辱以此問謹摭稿草書四十首以獻言鄙無取姑見其心若何也賜觀省大幸上楊兵部書某見古今人用不用賢與否常相半顧趨捨如何耳以直道偶退廢於一時在人未始不愈光也故卞和刖足其玉無價驥駕鹽車伯樂歎息誠所遭各有時也夫執事以公疾惡名四方在人耳目其著如鐘皷白黒之處八音五色較然也雖舌如青蠅萬莫可汚乃以矯枉過於正齟齬一時斥不得當路而逺為一郡然為郡古二千石之重其任非輕也在執事則為散地乘田委吏皆官之賤守以聖人處之宜莫可為乃不失曰牛羊茁壯長而巳矣矧連地千里且有民顧豈不足為哉其不以進退輕重固執事素物也某五年時江東信之屬吏也執事一見遇之不在衆人後既居先人憂歸山中某之友尉弋陽劉宇常致執事尚記姓名借齒牙之意世道百態自非俛仰或价人之執往往白首塵土不得上官正目一顧矧齒念不忘耶嗚呼古相知之道没於奔走若不可復見某拙愚不能逢迎乃不階一言之助而得執事愛遇之如此雖土木尚宜感動豈不自勵也邑人莫景去為常寧令亦某之友某雖不得出執事幕下而景為屬邑吏與某之身在無異也某既賀景得屬執事為令又竊喜執事得景付以民無疑也於其行因以書道所欲言賜觀省甚幸代羅司理干薦書某月某日謹齋沐獻書以干省判學士明公某聞明經之選古最重今最輕也待士之禮古最厚今最薄也選輕由取之不得其術也禮薄由士自待不厚也夫以最輕之術而走於禮最薄之途進必齟齬而得賤辱是無疑也某為經生雖愚常竊以此自戒未嘗一敢輕以足跡厯富貴者之門前為鄖鄉尉實公之里也夫以明公為宰相子奮才業驅名聲葢旦夕擇大位而居而士之拜於庭者出必喜且相告曰公之富貴之色未常見雖新進小生到門未常留得見未常不盡禮某聞此猶思之累日始敢進自辱出門下遂被愛遇使某釋然不知明經生之輕而身為尉之賤也竊念某始以家貧甚力耕不足以為養趨速化之術遂誦書舉明經既而得一官祿少母老又不足以為啜菽之具稚乳膝下弗煖弗飽退之曰蹈於寒餓之水火是某今日也昔有匄者負人之母號於道雖餓夫凍婦過於其側亦莫不哀而顧囊中無惜矧富子耶矧仁人耶且明公待於士之禮不肯與世俗髙下則人之才不才也豈計於選哉某之區區不勝犬馬不宣上王天章河北都運啟某啟復審内輟論議出應煩劇未即大用葢鬱輿望恭以天章都運柱石之姿自結日月暮召主父歎息見晩亟登侍從莫不謂宜大河以北旱饑之後水洊為患雞猪為魚草不得生民無以食老幼散亡未輕得復兵師在邊仰口待足賦歛緩急死生所繫區處之難非材曷依上念疲氓公實此行一方之病視公為醫某拙愚無能愛遇最厚西來之人坐聴歡誦旦夕眷召心實踴躍憂國之重良實為右不宣謹啓上楊侍讀啟某啟伏審上輟侍從以惠鄙逺凡居庇屬莫不歡幸恭惟知府侍讀早以文起為國俎豆雅誥之風復之旦暮筆端雨露以潤天下國家世篤道德比嘗苦兵人飽太平愁困易起上寛螻蟻干羽僅息歌吟之聲未復故常惟陜以西國之右屏方佇碩德與人休息旰食眷選惟此之賴某塵士之役得出幕下竊慶千里不勝犬馬不宣謹啟上秦州李宻學賀啟某啟人統更端萬物以新在易之泰君子道長恭以安撫宻學文武之資屏此藩疆専用儒雅以飾五兵掃灑一隅視無西憂古曰蠻夷中國之隂陽德日進邊塞寜謐四方臥鼓再基太平左右大鈞非朝則夕頌望之切飲食於是不宣謹啟謝舉官書古之舉士得其人則受賞失則絀罰大抵受賞常多而絀罰者幾希耳而士之被舉者其報禮亦重故曰士為知已者死後世舉士之賞未嘗有一不得人則絀罰與之等其士之生於此時而被舉者宜如何報乃反不然今日被舉矣明日持手板抵門伸一拜以為謝退而或為罪無所不至甚者至竄流前後皆是而舉之者坐廢放動幾年不得遷其為舉之難也如此自非土石宜當動心某無所可乃辱執事舉謹持是說以抵門不敢區區効一拜之禮他日功名之途萬有一某之迹當以此為謝不宣謝運使舉官書某聞驥立於伯樂之門偶未售人必曰駑駘也矧常馬耶楩梓列於匠石者之庭繩墨未及人必曰不材也矧常木耶凡士之處世亦莫不然今執事使一方葢士之伯樂匠石也而長安執事之門庭凡陜以西之地郡三十二而縣百三十有三其為吏不知幾百而嵗得舉者三十人而已某拙愚無所可曰常馬曰常木其可也從幕府於兹將二年是立而列執事之門庭者五百日其短長固察之熟矣乃辱不遺而舉以充三十人之目某意執事不忍使人視而指之曰駑駘不材也仁孰甚焉今日執事拔而出於駑駘與不材之列又安知明日人從而曰驥與楩梓也夫千里不宿驥之能也萬鈞不知楩梓之任也某之齒踰三十爾他日無千里與萬鈞之責則已也或有之固不足勉耶謹持木與馬之說詣門以謝裁覽大幸不宣上成都楊端明啟某生長妄庸陶染文字腕脫為吏濫巾幕府庖丁鼔刀親覩餘刃鞭箠之下駑緩不棄諒其樸拙終始一遇千里之尾青蠅所幸九折之馭公車以西慶雲其逺荆棘失望自去教語涉更三時寸紙隻字不抵左右非心實然奔走之勤自省曠愚踈屏所甘恭以知府端明清譽直望玉壺朱絲賈生度越天子所歎内外踐更文武明白蜀天最逺國之臂脅視無西憂公實此行下車撫御人人自如崇學教𨗳士之所向東來之人頌聲翕然論議之益旰食所渇烜赫大用匪朝伊夕禱戀之素不勝傾倒謹奉啟問台候不宣謝舉官書某少之時讀古書見古人所為以為人之處世弗才則巳苟才也惟所欲朝巢由而暮臯䕫無難也毎讀史至東方朔傳其言曰用則為虎不用則為䑕竊怪朔之言以為妄誕無取及稍長走時之途見世人顯榮者未必盡賢其困苦無聞知於時或至老死者亦未必盡無所可始悟朔之意乃歎息曰用之雖不才也可勉焉不用雖其賢世莫得見與不才而死者均也朔之言然今世俗以相知相市必俟其求而後知者有矣介而後知者有矣或不求雖其才不知者亦有矣故不介不求皆自知者知之深莫深於自知如某不才者得一官顛沛而困苦於兹已十年書吏考者一再而已得其所者爭笑之執事一見待而知之如平生則何嘗介而又俟其求之哉古相知之道不出於此今又書其名薦之天子以為可用夫士窮易失之某困如彼而獲莫深之知而不才之用其德於執事當如何古人曰國士遇我則國士報之如某也何敢讓不宣某再拜賀汝州吳資政到任啟右某伏審尚輟侍從請麾間郡上意眷可世風敦厚已㳙剛吉班鬯條教内外上下莫不欣仰恭以資政侍郎禮樂之器舜鏞周豆文章體骨筆追三代向官二府臯伊之資太平之期莫不仰首旋歎外補大器小施麴蘖造化人以為晩繼由病告獨求散地區區汝潁衣被仁愛京師脣齒實䝉其福某嘗吏幕府䝉顧乏厚咫尺門棨絆不得前馳心慣戀不勝踴躍謹奉啟事陳賀伏惟鈞慈俯賜鑒念謹啓謝舉官啟右某近得本州進奏吏報伏䝉運使金部發章舉某充親民官者明於用人不俟其備一言假借過踰衮黼駑鈍之質以報為憂伏念某妄庸之資短無所可徒以佔畢不㤀素訓遂縁隻字偶玷科第家憂身虞困迫交來嵗將一周吏考無幾質薄售大鬼神所瞰再由幕府幸吏車下黽勉簿書未絶寸尺旦夕惴惴苟户廩入澄清之轡擢取罷辱毎冀鞭䇿庶勉欵叚敢期公輸之家繩墨所材梗楹桷榱拱把不廢郊外孱弱過加翦拂隂幽之植不春而榮兹葢伏遇某官開發材藴上應倚任既富於國又欲盡人先勸後懲猥及愚鄙以安能者以激慢懦深意厚德其在於此敢不仰止古訓視困為進險易一心知無不為期有樹立以答待遇過此以往不知所裁謹奉啟事陳謝伏惟尊慈俯賜鑒念謹啟上富大資政書大資閣下某五年時與客語當世名公大人之所為客曰子識富公乎某曰識而足未嘗及門也客曰足未嘗及門而遽曰識何妄也某曰不然某所謂識非拜於面而出其左右前後也乃聞其言行事而識也昔周公後堯舜千年始生其心與堯舜相識孔子生又去周公六百年其心亦與堯舜周公相識其後孟荀揚韓文中子其生也皆相去百年或數百年其心莫不相識者也今某為公一時人其言與行事在天下耳目甚著而反不能識在愚人何以異客以為然某平生讀堯舜周公孔子孟荀揚韓文中子之書恨不得出於其時為其臣與子弟矧神聖居上臯䕫在列而親從下士之後者耶方幸十四五時始接人事學習文字耳已熟閣下之所為口巳誦閣下之言其後十年舉詩賦得乙第走仕途之塵者又十年其區區之懐欲以足跡出門下者兹二十年矣然未獲願欲以為恨雖寤寐飲食未嘗忘去年秋某在許昌幕而車騎之蔡嘗一瞻馬首今者將官於齊道旌麾之下輒以書布二十年之心代執贄以見伏賜裁幸不宣某再拜謝青州文相書相公閣下某聞之善御者鞭箠之下無駑馬良工斤斧之側無棄材故必楩梓然後用非公輸也必千里之足然後御非王良也故世之取人亦莫不然某妄庸無所可凡世俗之所操持以奔走於進取之途者非獨不肯為是亦不能直膠於古人之說為可信而不疑故走三州之幕而所事者數公其知之者有矣其不知之者亦有矣知之未嘗喜不知之未嘗不樂何也知之恐不能報以為憂故未嘗喜不知之自顧其中所有者猶在故未嘗不樂竊自惟念得一官十年其連蹇齟齬居其半書所謂吏考者纔三嵗而巳其身之困也如此仕宦之所欲恃以為助者則故舊親戚無一人其地之寒也如此夫王公大人之門天下士莫不能欲摳衣裾而覷末光其迫於貧賤而不得進者葢十常八九某也持如此困之身而走如此寒之地乃一日猝然得出於大君子之門以為吏兹非其可遇之遇也誠不自知其幸恭以相公治天下之公輸而御多士之王良也弛張五常以為斤斧鞭箠之具今者天子欲寛東顧之憂實為此行又辱不遺薦其名天子挽而置之幕下以為用某何為者而堪此任閣下不獨不楩梓與千里而後取葢收木之棄材而縶廢故之駑馬無以異者豫讓困放為衆人至殺身以報智伯之遇如某其身困且地寒如彼又嘗齟齬矣曽未土木於其門下也宜如何報不宣某再拜賀文相公啟某啟得進奏吏報伏承相公奉八月十三日制書建許昌節移鎮長安者竊以入柄鈞陶出專斧鉞注意内外莫顯於兹舉動輕重朝廷所繫恭惟太尉相公柱石之姿遭辰得君文武施設成就明白興遺補弊黼黻後來留意消息避郤隆寵一麾偃仰股肱之邦國有大論朝野倚屬四方或憂側席起坐得公之重天子洗然今輟霧雨以恩秦人衮衣其歸旦夕所歌再筦魁極日月以冀某極陋無似早玷宇下驟違誨約饑渇不展大斾西指霜露所勤以國自䕶禱戀之切謹奉啟事陳賀伏惟鈞慈俯賜鑒念不宣謹啟雜文上述藥夏四月暴得寒熟病視以醫其市藥也價貴賤不相適疾間掇其畧書之按本草藥之品有三上與中也下也上藥主養命句性和厚無毒服之多與久不傷人中藥或有毒或無毒能止病下藥大有毒其性專攻擊不得已始用之今附子也硫黄也綱砂也阿魏也所謂中下藥也乃大貴而术也茯苓也蓯萸也牛膝與芎也柴胡也所謂上藥者也反甚賤焉夫人一身百骸也内之有甘酸辛鹹苦之為好惡也外之有寒暑風露之所感也其味與氣一有偏則多疾今由藥貴賤視之時之人其可知矣平日固未嘗視藥也一旦疾作或有不之醫其所先惟禳也惟禱也不即諸佛則即諸老也即諸巫也而請焉即諸佛即諸老即諸巫也不可為而疾日加深始醫之求醫之至也視之且攻日加深之疾其勢不得不用有毒專攻擊之藥也故中與下也常十九焉如此不至於彼而幸生者無幾人此附子軰乘時甚貴而术等賤誠其勢然也噫使舉時之人皆知餌上藥也取康寧為養命之術則术附子其如何貴賤哉夫天下猶之一身也君心也古之以其臣養天下可知矣五帝之臣上藥也三王之臣中藥也五霸之臣下藥也毎讀班固史見漢之所以養天下未嘗不為之恨概舉之其人明王道如董仲舒言治亂如賈誼推廢興如劉向得聖人之道如揚雄用刑如張湯杜周計利如桑𢎞羊將兵如衞青霍去病及迹之行事與其位之小大若仲舒誼向雄术軰也皆齟齬抑鬱卒不得大有設施於時而湯周𢎞羊青去病附子軰也率希世幸用事位不下公卿大將軍其於藥貴賤與時髙下弗差也亦其勢不得不然也且使文帝始大用賈誼武帝又大用董仲舒元成又大用劉向哀平又大用揚雄自可相去上下扶持驅漢以趨三王之堯舜為劉氏壽矣奈何多任附子軰新室其夭也有來矣常聞餌草木金石之藥之有毒者始若大益其酷烈之性積而久則發發則人常死如莽非漢發藥耶哀哉吁後之養天下也視漢之養天下其可監時慶厯五年讀子胥傳古今讀吳夫差子胥事以為恨皆罪夫差痛員計不行而卒讒死也予意為不然且子胥其先幾世臣楚至平王亦身與其父兄北靣事之雖平王虐不道實君也日為讎至死破國戮其尸極矣初適吳言伐楚不可知公子光有内志乃進専諸焉巳而光果使專諸刺王獠殺之自立為吳闔閭始引員為行人與圖事遂入郢云然則光志簒専諸兵也員手之闔閭死事其子夫差其逆䇿越誠善可用員如此其可信乎噫晉殺里克齊小白用夷吾君人者曉此所以興如員其頸不汚闔閭之刃已幸矣有死之道焉耳無可信而有死之道屬鏤員自拔也悲夫且死也為有知可謝子胥使無憾徐君處士妻周氏墓誌銘東海徐君處士妻周氏卒之明年將以某月某日𦵏於某原使其客狀周氏抵予乞銘曰周氏其父恭先世以農自力豫章學家分寧最盛鄉黨命儒者出入人皆知為可貴恭慕之而其子兩人業已耕念不可教獨周氏㓜而慧乃使授古女誡七篇習之既長歸徐氏事上撫下皆有禮可愛里人緩急必奔之無所惜處士少學不得志而歸周氏恥之益欲教其子凡賔客至其家周氏必手為具盡意厚遇之寒暑未嘗憚他日里人某人趨禮部試踵其門處士以故不欲見將謝之周氏曰士及門而辭以事非君所以欲教子之意也叱其子見之既行又資其囊以若干今徐氏為邑之大姓其子皆好學恥不若人葢周氏有助云以慶厯七年十一月卒嫁二十有八年凡生十子男女各五人享年四十有九處士名晝予弟其婿也遂為之銘銘曰男欲其有室女欲其有歸此父母之心也周氏十子其㓜六人􅈱􅈱滿堂孰室孰歸今其死不足者以此悲也丘令疏詞鎮乾祐丘令年六十為州縣吏令解官其家窮空欲歸其孥京師不可行持十口寓於佛之室將無以為朝夕之具某官長安間三日或五六日讀進奏吏雜報天下事吏坐賄大則竄流其次廢棄終身最下免其官如此者月未嘗無凡天下之吏富者未必皆㢘其賄而偶未敗者又不知幾人今丘令官如此其卑而其家又貧如此將不得為㢘者耶夫吏在下潔其身以進一日離其官則有憔悴不得所之色其吏之貧者雖在位苟嵗月之祿以活妻子莫不皆知他日饑寒迫切之憂不得免則誰肯勉而為㢘也賙撫急乏常人所欲為在吾曹忍豈不行丘令如此惟衆君子之仁謹疏送興平孫隱之新州都序闗中風俗尚氣勇鬭訟縣邑小不得平必直於州未嘗肯輒屈興平京兆大縣孫君隱之居二年而某當其時在幕府者八月邑之訢於府或日有而興平之民往往越月至踰時無一人凡一府屬官皆知隱之而無疑毎案牘經平決者輒不復省今年夏寶雞民兩家争里胥甲户最髙而乙其次甲曰乙未嘗役乙曰甲戸髙縣拘文以甲充不服言於州又不服轉運使乃遣興平決之隱之曰法兩相決以户髙謂皆應平役者甲雖其户髙然嘗已役矣理不當引與乙比引與乙比此是甲嵗嵗無息肩非法意卒以乙充議者以為然某嘗得其書而讀之竊思西兵以來民緩急應用度破殘其業者相望矧復不均欲書其說以遺為邑者而未能今隱之行得稱以為别且賀新都之民其役當無有不均也為之序善惡有餘解易曰積善之家必有餘慶積不善之家必有餘殃至於堯而丹朱瞽瞍而舜人惑焉解曰堯之善及天下丹朱恃焉而日進於惡其慶不足銷故不肖瞽瞍之不善天下聞而懼及其身而進於德其殃不足銷故名列五帝孰謂堯之慶瞽瞍之殃無餘也世之言曰瞽鯀有積善又曰善惡無餘異哉復維識院記予九月自鄠之藍田宿道旁寺問其名曰維識其僧洪集曰五代時石識存焉按其刻曰龍泉寺國初更名義井其後寺廢開寶九年通維識論僧志興即其地廬之始號維識院慶厯初西方用兵詔寺不及三十室者皆毁至是院又廢後五年用言者陜以西寺毁而今願復者宜勿禁故洪集實力之其費出於民姚氏者七人洪集有僧行且老誦經日常一飯環其地數鄉之人趨信之葢如歸姚氏七人非巨家能得其不顧吝而洪集無寒暑奔走能勿懈故其室不俟久而成凡為屋曰殿曰堂曰厨曰門曰閣者八區若干間皆壯宏可觀噫儒詆佛未嘗為尺寸地雖童子不肯輒屈曰國家當詔四方郡無小大皆立學本古庠序之法以為教甫一年學不幸而廢天下士反無一言復之者今維識再毀矣皆不數年而復其不顧吝有若七人者其勿懈有若洪集者其請而勿禁有若某者是儒果出佛下甚逺也儒之人視維識豈獨不愧其明年五月院成洪集以始末來乞予言遂書之且以見其心之恥云時皇祐二年豫章黄某記吕先生許昌十詠後序廣文先生吕公天聖中為許昌掾取境内古跡之著者為十詠其時文章用聲律最盛哇淫破碎不可讀其於詩尤甚士出於其間為辭章能主意思而不流者固少而最難先生之詩其不流者與後二十有二年其子喬卿又為判官許昌按家集求所屬謂十詠者得於龍興佛壁之小石慮其久或亡也又買石刻之凡文章非其意髙雖貴時輒不傳而必諷誦在人口者纔十一二位下則其傳而又誦者愈少先生之為人如其詩故仕以不達某為童子時已誦先生之詩如鳥窺明鏡心人踏靈鼇背至今在唇齒間如昨日則先生之文其可知乃書其意刻於詩之末先生嘗講書國子監十年故士多稱廣文先生其諱造字公初云妬芽說客有語予人有以桃為杏者名曰接其法斷桃之本而易以杏春陽既作其枝葉與花皆杏也桃之萌亦出於其本蓊然若與杏爭盛者其主人命去之曰妬芽也客憮然以為怪予釋之曰桃之實不美則易既易之則惟杏之愛桃芽於其間其勢不得不去也不獨人之於木為然天之於人也亦然天下猶之巨桃也天猶之接工也其實不美則天亦接之昔夏之實不美天以湯接之桀其妬芽也不可去乎殷之實不美天以武接之紂其妬芽也不可去乎秦之實不美天以漢接之子嬰其妬芽也不可去乎隋之實不美天以唐接之酅公其妬芽也不可去乎客曰然則當塗典午其實皆美與曰其實美吾不知也客三嘆而退歸愚堂銘并序人之生也惡乎本曰性而已矣智愚者性之質也善惡者性之用也故性之品有三上焉者智於善而愚於惡中焉者善者智之惡者愚之下焉者愚於善而智於惡夫忠孝仁義善之大者也其不忠也不孝也不仁也不義也為惡亦莫大焉或曰小人亦智與曰其所以為智是亦愚而已矣河内向宗道元伯以秘書丞為益都令既踰年其民事亦簡出則與其所往來而相知者為詩酒之約歸則休其心於詩書文字間未嘗懈嘗讀退之詩愛其句有歸愚識夷途者因取以名其朝夕所居之室其惡者愚之之謂歟予恐觀者惑其所以歸之之意因銘其柱以見焉銘曰善也邪君子之歸也惡也邪小人之歸也歸乎忠孝仁義愚乎惡者也愚乎惡者歸愚者也夫善之為途也廣矣途之不治則或棘焉吾請五經為之钁過箕山說予嘗出箕山之下望許由冢其日又過潁山與客休於木交隂客有問曰許由何人也予曰古之賢人也客曰堯嘗以天下讓之者三而由去之入箕山洗其耳於潁水至死不出其視天下之人雖蹈水火不啻若越人之父視燕子之瘠不以屑意夫賢者宜不若是予曰堯之時天嗅舜之德矣十六子者舜嗅其才矣此許由所以踏箕山又洗耳示堯以不復出也且使丹朱不肖無舜以堪天之命其下無十六子者可以任舜之事則吾知由也雖焦毛髪濡手足以奔天下之急不肯辭矧其位耶客以為然既歸書其所以語客者以為過箕山說過韶石說韶石參錯布列掘起且秀逺近皆可愛為川陸上下者觀遊之勝舊說帝舜南巡奏韶樂於此因名焉古今徃來者莫不踟蹰顧盼既嘉石之可愛又恨韶樂不可復見至於嘆息者多矣且韶之所以為韶也抑有以也舜為天下其治之大要舉八元八凱去四凶敷五教明五刑而已卒至於比屋可以封而垂拱無為故韶者乃舜一時天下至和大治之音爾彼獸率舞鳯來儀使無之不害為韶也假舜也其始不能舉八元八凱與去四凶又不能敷五教明五刑以為治且安能使比屋可以封而垂拱無為也則其樂也烏得謂之韶哉夫舉八元八凱進賢也去四凶退不肖也敷五教納民於善也明五刑去其惡也後世有天下之君能進賢退不肖使郡守縣令臺閣之間廟堂之上無不得其人能敷五教使父父子子兄兄弟弟夫夫婦婦無不得其和能明五刑使其民悉遷善逺罪中外遐邇無不畏戒如是而天下不至和大治葢未之有也從而播之八音飾以五聲文以六律是亦一時之韶矣何必舜也予之官畨禺道出石下追古今往來者之意為之說云雜文下乾祐丘令第三考詞已後長安京兆縣十三而乾祐尤阻山其民喜鬭多盗賊前件官至不能撓以刑常觀其所上旬禁書而獄或月二十九日空三年矣聽於民無有間言績固可嘉矣涇陽丁主簿第一考詞主簿掌凡賦稅户口之事緩則失時急則民困而或散亡惟能得中於職為稱前件官主涇陽簿一年而縣獻其狀賦稅曰不失時户口曰無散亡能如是來效可待也醴泉張主簿第二考詞天旱饑民之疆者起盜賊而弱者流亡以為常去嵗陜以西小不收米斗至三百醴泉其户萬二千不亡一口而為盜者無一人雖長民者之力而主簿豈不與焉祭王觀察文年月日具官某謹以清酌庶羞之奠祭於故觀察王公之靈惟靈遭遇先帝起身行伍今使觀察不為不貴壽百二十七十幾人公年實然可以無憾兵師之行或膏草野今全而歸何有歎嗟銘旌飄飄與西風共聊陳薄薦死生之别伏惟尚饗祭神文維年月日具官謹以時羞祭於天齊仁聖帝之神惟神魯國之鎮四方所仰廟於此邦如山實在此夏六月不雨百日千里菽粟若不可望民聲嗷嗷天葢聴閔一雨而足秦人忘旱及此收歛禾穗滿野霶霈之賜神實佐佑某來守此土遂䝉稔成芹意以物為神之報尚饗維年月日具官某謹祭風伯水師之神夫左右風雨之柄助天以生物而成之者惟神職也平時風雨順適神之功民不能見獨國嵗兩災並除以為祈與報也今年陜以西不雨且旱巳而得請於神秋稼滿野凡十三縣之人莫不皆願操持其物以啟神貺刺史謹擇日具牢醴以為民羞尚饗維年月日具官某謹祭於金山之神惟神生而佐理天下去大亂使黄帝得為五帝先死而為明神是亦必欲福四海擁千里也今年夏大收視常嵗為倍而秋又巳有望非神力而何敢以物報尚饗風后同維年月日具官某祭於雍侯之神惟神生與豪傑俱起而不得其時雖功名無所見於世死而能福一方又能使其民廟而祭至今俎血不乾可以無憾今雍千里民無災癘牛羊蕃息稼穡滿野孰為神報新酒大牲尚饗維年月日具官某祭於濟衆侯之神國家以神常用風雨救大旱有功於前世故嵗時祭於侯之廟未嘗闕如今乏民親受神賜今年夏不雨踰三月常禱於神既旱而豐則國之欲報於神之心也當如何意不可見牲酒是具尚饗維年月日具官某祭於廣惠王之神凡陜以西之民知神常以風雨塞大旱之望毎嵗少亢則老㓜若婦女奔走於神之宇未嘗不朝禱而夕望雨至一禾一菽莫不得神夏實欲旱秋為稔收祭民之食神其降兹尚饗九龍堂澄源夫人同維年月日具官某祭於露臺之神惟神合民之祭得所憑依國有祀典非功不在神備常享豈無物助罇酒豆牲實為秋賽尚饗代祭致政吳侍郎文維年月日具官某祭於故致政侍郎吳公之靈惟公國之杞梓初走散地虎符出入為良刺史葢晩始達耆碩之臣公實有子請老以歸二疎道路又無轍迹公乃投足世風敦厚後來所仰名教之力千鍾之養五福一身林亭池園杖屨往還箕潁之地若在門户稚孫左右抱弄襁褓笑言在耳弔者忽來輔弼之子公如不亡身後光輝可以無憾見意以物菲薄之薦嗚呼尚饗祭致政吳侍郎文嗚呼岳瀆之氣實為壽齡公葢鍾之黄髪在庭不盡其器刺史而已天畀宋賢生公之子左右日月公始敢歸朝夕艾綬以當綵衣始來自陜某迎馬首公在版輿孫子在後觀者塞途莫不歎息公子下車政出人喜千里老幼如被公賜道途之勤未拜几杖而止一月哭於公堂素車在路朔風滿旐聊陳薄酹淚落酒觴伏惟尚饗書記考詞公美古記室之任在軍旅間文辭謀畫無不與後世往往施之簿書獄訟其職守益失前件官以名進士由幕府西師不用凡文辭謀畫之事皆不得施獨書記所謂簿書獄訟以為吏課而巳才葢鬱焉周主簿考詞縣邑古方百里之國也主簿且得其人雖其令不賢其簿書獄訟亦無有不治郡府緩急欲擇人而使者必取之其尤能者或席不得煖前件官其人也西嶽祈雨文維年月日具官某謹遣某以清酌庶羞之奠祭於金天順聖帝之神惟神福此方之民國之屏也故天子嵗兩時署祝詞遣吏以祭未嘗懈陜以西自正月不雨至於今將六十日苖之在野欲秀而實者若不望秋穀與豆種不得入民葢皇皇也某來守兹土未一月視此朝夕恐懼所以未至凡境内食民之祭雖里祠皆將奔走以為民請矧神一方之望而天子所禮也敢不以告尚饗蘇司理第三考詞秦人尚氣喜鬭多大獄難治而京兆訟訴最繁故理官視他郡其責最重前件官處最繁為吏鞫難治之獄而有最重之責於兹三年其論之自殊死至於杖笞無慮數百人莫不皆得其情而有寃隱不伸者斯能也已矣持是以為吏奚而不可謝雨文維年月日具官某謹遣某人祭於澄源之神曰陜以西之民一嵗之望麥與粟也天時未必均齊或夏穰則秋歉或粟有餘而麥不足今年春與六月不雨幾百日苖不得成實皆請於神未嘗不三日而雨足既旱而豐凡十三縣之人如神家至户到而與之麥與粟也其德於人之心宜如何刺史有民之責也使千里之内無有歎嗟是刺史一身而逭十三縣人之責在神之賜愈大也其德於神之心也又如何敢以物告尚饗張法曹第三告詞法家大抵多刻少恩以為常前件官舉進士為掾日持十二通與他法立刺史前論人之罪務以平反為主於兹三年其所處者幾百人無有不當其誠才也從可以知祭神文年月朔日具官某祭於天齊仁聖帝曰五嶽天下之望而泰山尤尊山之出雲雨以福於民其功最著惟帝以尤尊之望而持最著之功以食於廟今年春與六月常不雨前後幾百日凢千里之内奔走請禱無有不得其心麥在倉廩秋稼滿野神之賜其可見帝雖不徳人心謂何刺史具肴酒薦其意以為民報尚饗九月日祭於風伯雨師之神惟神風雨之佐人實攸恃廟於此土觀瞻如在其祭孔時旱不敢嗇今雍之野宜於嵗年百穀茂好如無災害衣食之賜德其有歸祭民之具神其降兹九月日祭於金山風后之神生為豪傑而死為明神福此方之人而食其祭某今年春來守兹土四方或大水或饑或疾疫至於死亡流離凡陜以西之民無有一於是非神之力而何敢以物報尚饗九月日祭於澄源夫人之神曰惟神有風雨救大旱之功在祀典以食民祭雖年不善未嘗敢薄其具今環陜以西之地百穀之種無一不宜粗耕疎耘斂穫收穰凡此之人莫不皆欲操豚肩酒巵走神之宇圖所以報刺史以時享道民之意其鑒之九月日祭於城隍之神曰髙城深池不虞之備邊疆弗騷吏以致守不壓不湮以為民勞擁䕶之力非神曷依祭具常典惟此之報九月日祭於阿父之神惟神廟像之嚴民所依歸農占蠶祀香至交來兹年之善下田其豐人無疾病牛羊滿野繄神之貺家思其報厥祭不腆神食其意尚饗西嶽祈晴祭文維年月日朔具官某謹以香果之奠致祭於金天順聖帝曰關中自用兵踰十年其地未嘗夏秋俱大收天時之不得而征斂有出中家下户幾無以為生今年風雨節適麥畆至數斛而秋稼又滿野是神憫斯人而惠之最大也八九月粟菽皆巳實而雨晝夜不止民不得收老幼嘆嗟若將絶望皆曰食巳成之倉廩而耕不穫雨之棄也奈何聰明其德之以卒神貺尚饗祭古帝廟文年月朔日具官某謹以清酌庻羞之奠致告於某帝之廟惟帝有大功與德在前世以食於廟至今俎血不乾兹民瞻之恭嚴如生後世有天下之君雖相去數千百年而嵗時修祀禮未嘗敢忽今皇帝以九月辛亥大饗於明堂禮畢詔天下凡古聖帝明王之祠皆遣吏以祭某兹土之守也謹擇日具物以修天子之命明靈其鑒之尚饗祭漢唐配享功臣文年月日祭於某公惟公命世之佐實天所畀遭時得君功名莫先史臣之言若青與黄既廟而食惟帝之配生死孰榮兹無愧已季秋辛亥國有大祀峩峩明堂希濶之典徧於羣神告禮之成來薦豆籩天子有詔尚饗文相到任謁廟文年月日祭於至聖文宣王某受天子之命來守許以今月戊寅視民事凡千里之内有一物不得於其心某任其責思其職之初懼有未至冀之相之謹以物告尚饗祭某廟文祭於某廟之神曰刺史食君之祿而神食民之祭職之治否刺史實任或天時之不得至於水旱與疾癘非政之為則民歸之神某來守兹土與神同有是青於許之人今抵官三日方思其職不敢懈謹以物告尚饗黄司理第二考詞國家凡天下之獄設提㸃官以察其輕重不如法者而紏舉之州縣吏坐出入人罪大則免放小則責罰未嘗無其人前件官治許獄嵗再周矣論其罪棄市者五十四流若徙百三十有四杖百八十六皆得其情無有寃隱不伸非才也其孰能其考可書中春牛祝文祭於勾芒之神惟神職此木行生物之佐乃今甲辰是為立春陳根可拔田事其始乃出土牛示民以時國有常祀吏敢弗懈農無災害惟此之祈不腆之具神食其意尚饗代祭黄丞相廟文維皇祐四年壬辰二月朔四日具位文某謹以清酌庶羞之奠祭於漢丞相黄公之靈惟靈生稟於天德潁之民没食其祭福之無疑某也寄守此土仰止髙躅喬木之末清風如在伊春之仲農事皆作無有災害兹民之望祀有常典敢以物告尚饗代祭宋令公墓文年月日具位文某謹遣某官以清酌少牢之奠祭於故贈太師令公宋公某友公之子而公之室藏實在兹土今得請以省先子之墓道途之勤不得躬修奠禮宰土之下謹具物遣吏以其意告尚饗代祭章郇公墓文維年月日謹遣某官以少牢之奠祭於故司空郇國文憲公惟公茂德懿實映國之史焜燿前人後來所仰忝守舊許公墳實在喬木宿草令名如新乃今得請省墓於洛左右板輿出此便道涉履之勤意不能專牲酒勿腆敢以吏告尚饗代祭張文孝公墓文維年月日具位謹以清酌庶羞之奠祭於故贈尚書文孝張公惟公冲泊之德抱藏英莖器之渾粹白琥赤璋遭時得君亟為聞人出入三紀庭之耆碩必持物鈞衆志勿疑不極其有齎恨以没巨梓偃蹇公輸欽嗟追惟曩初遊公之門堅節輪囷公實斲之國士之報勉勿敢忽户牖謂何興言慙恨乃今得告省墓先子道公之墳宿草實在音容如生恍在耳目敢以牲醴拜壟之下公乎有聞食其區區尚饗代祭建成侯廟文年月日具位文某謹祝某官以柔毛剛鬛清酌之奠祭於漢丞相黄公惟公去思舊德潁民弗忘祭血不亁恭嚴如生某忝守兹土庶幾清風今省松楸道出廟下遺光餘饗若見若聞禮公之庭行役勿果厥誠區區敢以物告尚饗代祭杜水部文祭於致政水部杜君之靈惟靈仕宦克勤以始卒聞位止於郎雖未為達専城之惠古人所先壽百二十七十無幾君年實然何有憾恨仕之惑者走於桑榆不有敗廢卜以柩歸君葢請老死生之光逺日有期銘旌在道聊陳薄酹以見其意尚饗舞陽尉第三考詞舞陽大約地廣他盗徃往囊橐於其間居一嵗為竊與强者凡十一前件官捕得之或杖或徒或黥或棄其亡者一而已矣夫如是非才焉固不能其考可書中祭辛氏太夫人文祭於某郡太夫人之靈惟靈四德具備宜於室家母姑之懿發聞於人善慶之報乃俾百年衣纓雜還有子與孫啟手之日稚呼耋嘆子葢七十杖絰孺慕觀者左右莫不咨嗟詵詵之門人曰不亡奠禮不腆庶幾其意尚饗代祭范大資文皇祐四年嵗次壬辰六月甲戌朔文某謹以清酌庻羞之奠致祭於大學士侍郎髙平公之靈惟靈文武之資以時挺生出遭千齡亟為名臣諫諍之風古人勿忘逆龍之鱗孰不曰難朝夕踐履若飲與食雖或齟齬名益發聞婦人童子知君所為世實有言臯䕫之姿或斥於郡不沮益堅寶元之間西夏弗賔君臨我師色義卒奮言伐虜心奔走乞盟矢石出入天子所勤召且大用參國之柄君所設為不襲故常欲致天下堯舜乃留弗極其有莫不歎息刺史十年偏迫不施上闕左右議望必歸或者抱負庶幾一伸物理孰究志竟以殁嗚呼希文止此而已忠也不朽來或可期柩旌之東手奠莫前死生之别興言梗結矢意以詞傷哉奈何尚饗春祭祝文已後青社告於某神曰凡物莫不得其生然後可要於成若其生也燥濕寒燠不得其宜後雖有五日之風十日之雨欲其堅實茂好兹莫可得故民一嵗之望在於春某守兹土敢忘是心今百種皆作其生成之助捨於神其孰依尚饗張都曹考詞為吏患不能勤勤矣患不能亷亷矣患不能久故職舉為勤知足為亷終身為久前件官為青之掾三年凡刑獄租賦無不舉既勤矣而又能亷其肯不久者耶審如是所謂能吏者豈復有他術哉其考可書中上法曹劉昭逺考詞法者禮之防也其用之以當人情為得刻者為之則拘而少恩前件官以通經舉進士始掾於此若老於為法者毎抱具獄必傅以經義然後處故無一不當其情其刻而少恩則無也其考可書中臨昫縣尉李正辭考詞青之屬邑六而臨昫最小其地介山冦偷往往囊橐於其間故常居士幾十人以備盗今其令又用武人前件官為尉於兹盗發輒得之未嘗亡一人非其才耶其考可書中臨淄尉考詞尉能捕盜使盜知不可免而不敢為盜亦去盜之一端也山東大約號多盜今臨淄獻一嵗之狀視他縣者纔幾人而巳前件官為尉葢有助云其考可書中益都縣尉朱康濟考詞官無大小因其能而使之則職無不舉也三齊多盜而益都青之劇縣前件官始以能捕盜得官今為尉於兹前後冦偷者發輒得之而未嘗亡一人豈非所謂因其能而職無不舉者耶然則其能也豈止為尉而已其考可書中代祭提刑陸學士文祭於故提刑陸君學士之靈早獵科第以才藻聞不揠於進積目以遷器其逺到莫始度量既伸既知為臺之選乃官書林乃刺於泉事為益著名能日香再試於外乃司邦刑攬轡所至訊讞有條符移之來墨葢未乾曽不疾云而以訃告善也殱殞其誰莫嗟子藥勿持室斂勿親柩客於道觀者忍耶麾符所繫手奠莫前矢意以言侑此肴觴尚饗伐檀集巻下
